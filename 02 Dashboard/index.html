<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VEHICLE DASHBOARD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Handjet:wght@100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Doto"', 'sans-serif'],
              doto: ['"Doto"', 'sans-serif'],
              handjet: ['"Handjet"', 'cursive'],
            },
            colors: {
              amethyst: {
                50: '#f6f3fc',
                100: '#ede8f8',
                200: '#dfd5f3',
                300: '#cab6ea',
                400: '#b18ddd',
                500: '#7947BD', // Primary Accent
                600: '#7c3aed',
                700: '#6d28d9',
                800: '#5b21b6',
                900: '#4c1d95',
                950: '#2e1065',
              },
              cyphgray: '#989699', // Custom requested visibility color
              'header-purple': '#bda3c9', // Updated requested color for headers
              glow: '#9B73D3', // Hover shadow color
              dark: {
                900: '#262E36',
                800: '#37424E',
                700: '#4A5665',
              }
            },
            animation: {
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            }
          },
        },
      }
    </script>
    <style>
      body {
        background-color: #050505;
        background-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.4)), url('https://images.unsplash.com/photo-1705608722619-21ad3ce84f50?q=80&w=2664&auto=format&fit=crop');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-repeat: no-repeat;
        color: #e2e8f0;
        font-family: "Doto", sans-serif;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(55, 66, 78, 0.3); 
      }
      ::-webkit-scrollbar-thumb {
        background: #7947BD; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #b18ddd; 
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      /* Custom card hover class */
      .card-hover {
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .card-hover:hover {
        transform: translateY(-6px);
        box-shadow: 0 20px 50px -12px rgba(155, 115, 211, 0.5);
      }
      /* Hide native Edge/Chromium password reveal button to fix duplicate icons */
      input[type="password"]::-ms-reveal,
      input[type="password"]::-ms-clear {
        display: none;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "recharts": "https://esm.sh/recharts@^3.7.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
